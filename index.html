<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="styless.css">
 </head>
<body>
 <header>
    <h1>Třídní nástěnka</h1>
    <p> Jednoduchá evidence úkolů</p>
 </header>
 <main>
   </section>
    <h2>Přidat úkol</h2>
    <form>
      <div>
         <label>Předmět</label><br>
         <select id="předmět">
            <option value=""disabled selected>Vyber předmět</option>
            <option value="MAT":>Matematika</option>
            <option value="AJ":>Angličtina</option>
            <option value="ČJ":>Čeština</option>
            <option value="FYZ":>Fyzika</option>
         </select>
      </div>
      <div>
         <label>Popis úkolu</label></br>
         <input id="popis" type="text" required maxlength="140"
           placeholder="Napiš popis úkolu">
      </div>
      <div>
         <label>Termín</label></br>
         <input id="termin" type="date" required>
      </div>
      <div>
        <button>Přídat</button>
      </div>
    </form>
   </section>
   <section>
     <h2>Seznam úkolů</h2>
     <div id="tasklist">
       <!-- sem dá JSseznam úkolů-->
       </div>
   </section>
 
   </main>
</body>
</html>
